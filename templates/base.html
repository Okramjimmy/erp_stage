<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ERP Stage Builder{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  {% block extra_head %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div class="logo">E</div>
    ERP Stage Builder
  </a>
  <div class="navbar-search">
    <svg class="search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" placeholder="Search stages, forms…" id="global-search">
  </div>
  <div class="navbar-actions">
    <a href="/" class="navbar-link {% block nav_home %}{% endblock %}">Dashboard</a>
    <a href="/docs" target="_blank" class="navbar-link">API Docs</a>
  </div>
</nav>

<div class="app-layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <a href="/" class="sidebar-item {% block nav_dashboard %}{% endblock %}">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Stage Tree</div>
      <div id="sidebar-tree">
        <div style="padding:8px 10px;color:var(--text-muted);font-size:12px">Loading…</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Global JS -->
<script>
const API = '/api/v1';

function toast(msg, type='') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function apiFetch(url, opts={}) {
  const r = await fetch(url, {
    headers: {'Content-Type':'application/json'}, ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  if (!r.ok) {
    const err = await r.json().catch(() => ({detail: r.statusText}));
    throw new Error(err.detail || r.statusText);
  }
  return r.json();
}

// Sidebar tree loader
async function loadSidebarTree() {
  try {
    const tree = await apiFetch(`${API}/stages/tree`);
    const container = document.getElementById('sidebar-tree');
    container.innerHTML = '';
    const currentPath = window.location.pathname;

    function renderNode(node, depth=0) {
      const hasChildren = node.children && node.children.length > 0;
      const isActive = currentPath === `/stages/${node.stage_id}`;
      const wrapper = document.createElement('div');
      wrapper.className = 'stage-tree-node';

      const row = document.createElement('a');
      row.href = `/stages/${node.stage_id}`;
      row.className = 'stage-node-row' + (isActive ? ' active' : '');
      row.style.paddingLeft = `${10 + depth * 14}px`;
      row.innerHTML = `
        ${hasChildren
          ? `<svg class="stage-node-chevron ${isActive ? 'open' : ''}" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="m9 18 6-6-6-6"/></svg>`
          : `<span style="width:10px;display:inline-block"></span>`
        }
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="flex-shrink:0;color:var(--text-muted)"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${node.stage_name}</span>
        ${node.formtype_count > 0 ? `<span class="badge" style="font-size:10px;background:var(--border-light);color:var(--text-muted)">${node.formtype_count}</span>` : ''}
      `;

      wrapper.appendChild(row);

      if (hasChildren) {
        const children = document.createElement('div');
        children.className = 'stage-node-children' + (isActive ? ' open' : '');
        node.children.forEach(c => children.appendChild(renderNode(c, depth + 1)));
        wrapper.appendChild(children);

        row.querySelector('.stage-node-chevron').addEventListener('click', (e) => {
          e.preventDefault(); e.stopPropagation();
          const ch = row.querySelector('.stage-node-chevron');
          ch.classList.toggle('open');
          children.classList.toggle('open');
        });
      }

      return wrapper;
    }

    tree.forEach(node => container.appendChild(renderNode(node)));
  } catch(e) {
    document.getElementById('sidebar-tree').innerHTML =
      `<div style="padding:8px 10px;color:var(--text-muted);font-size:12px">Failed to load</div>`;
  }
}

loadSidebarTree();

// Global search
document.getElementById('global-search').addEventListener('input', async function() {
  const q = this.value.trim();
  if (q.length < 2) return;
  // Could add a dropdown here; for now redirect to first match
});
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
